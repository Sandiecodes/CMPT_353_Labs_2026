version: '3'
services:
 app:
  image: node:latest
  container_name: nodecouch
  ports:
   - "8080:8080"
  command: ["bin/bash"]
  volumes:
   - ./:/code
  depends_on:
   - couchdb1 
  stdin_open: true
  tty: true
 couchdb1:
    image: couchdb:3.4.2
    container_name: cdb1
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=admin
    volumes:
        - ./couchdb:/opt/couchdb/data
    stdin_open: true
    tty: true    