services:
 couchdb:
  image: couchdb:3.4.2
  container_name: couchdb1
  restart: unless-stopped
  environment:
    - COUCHDB_USER=admin
    - COUCHDB_PASSWORD=password
  ports:
    - "5984:5984"
  volumes:
    - ./couchdb:/opt/couchdb/data
 node1:
  image: node:latest
  container_name: node1
  depends_on:
    - couchdb
  ports:
    - "8080:8080"
  environment:
    - COUCHDB_URL=http://admin:password@couchdb:5984
    - COUCHDB_DB=questionsdb
  volumes:
    - ./Backend:/backend
  working_dir: /backend  
  command: ["sh", "-c", "npm install --silent && node server.js"]
  stdin_open: true
  tty: true
 web:
  build: ./my-react-app
  container_name: react-vite
  ports:
   - "5173:5173"
  volumes:
   - ./my-react-app:/react-app
  #environment:
   #- VITE_API_URL=http://host.docker.internal:8080 
  stdin_open: true
  tty: true 
  command: sh -c "npm install && npm run dev -- --host 0.0.0.0"